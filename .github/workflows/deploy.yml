name: Deploy

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App to deploy"
        required: true
        type: choice
        options:
          - milnav
          - packing-list

# Prevent concurrent deploys of the same app
concurrency:
  group: deploy-${{ inputs.app }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.app }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.15.0

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO: wire up actual deployment
      # Suggested approach when ready:
      #   - Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID to repository secrets
      #   - Run: pnpm deploy:${{ inputs.app }}
      #   - The turbo pipeline will build dependencies before deploying
      - name: Deploy (placeholder)
        run: |
          echo "Deployment for '${{ inputs.app }}' is not yet wired up."
          echo "Run deploy.sh manually from the app directory for now."
          exit 1
