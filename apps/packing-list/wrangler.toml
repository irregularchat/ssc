name = "community-packing-list"
main = "./workers/app.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "./build/client"

[[d1_databases]]
binding = "DB"
database_name = "cpl-db"
database_id = "c34a7307-0899-4875-bbc8-1548b5ff6175"
migrations_dir = "db/migrations"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "cpl-uploads"

[vars]
# TODO: Move to wrangler secret — run: wrangler secret put ADMIN_PASSWORD
# This placeholder is overridden by the secret in production
ADMIN_PASSWORD = "CHANGE_ME_USE_WRANGLER_SECRET"

# Custom domain configuration
[[routes]]
pattern = "packinglist.soldiersupportcenter.com/*"
zone_name = "soldiersupportcenter.com"
