name = "milnav"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "milnav-db"
database_id = "PLACEHOLDER_REPLACE_AFTER_CREATION"

[placement]
mode = "smart"

[observability]
enabled = true

[vars]
TIMEZONE = "America/New_York"
